services:
  backend:
    build: ./backend
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=reviv
      - SECRET_KEY=${SECRET_KEY}
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=["http://localhost"]
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  uploads:
